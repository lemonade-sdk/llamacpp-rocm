name: Test Strix Halo Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on:
      - stx-halo
      - Linux
      - ta-devlab-halo-03

    steps:
      - uses: actions/checkout@v4

      - name: System Info
        run: |
          hostname
          uname -a

      - name: ROCm Info
        run: |
          rocminfo || true
          rocm-smi || true

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build git curl

      - name: Download llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git

      - name: Build llama.cpp
        run: |
          cd llama.cpp

          cmake -B build \
            -G Ninja \
            -DCMAKE_C_COMPILER=/opt/rocm/llvm/bin/clang \
            -DCMAKE_CXX_COMPILER=/opt/rocm/llvm/bin/clang++ \
            -DGGML_HIP=ON \
            -DGPU_TARGETS=gfx1151

          cmake --build build -j$(nproc)

      - name: Download Test Model
        run: |
          curl -L \
            -o Qwen3-0.6B-Q4_0.gguf \
            "https://huggingface.co/unsloth/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q4_0.gguf?download=true"

      - name: Run Inference Test
        run: |
          cd llama.cpp

          ./build/bin/llama-cli \
            -m ../Qwen3-0.6B-Q4_0.gguf \
            -ngl 99 \
            -p "I believe the meaning of life is" \
            -st -v
